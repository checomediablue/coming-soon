<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page Not Found – Checo Media Blue</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/img/favicon-96x96.png" sizes="96x96">
<link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
<link rel="shortcut icon" href="/img/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
<link rel="manifest" href="/img/site.webmanifest">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root { --bg:#fff; --card:#f3f6f9; --text:#1f2937; --muted:#4b5563; --accent:#149ddd; --border:#e5e7eb; }
[data-theme="dark"] { --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --muted:#cbd5e1; --accent:#38bdf8; --border:#334155; }
@media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) { --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --muted:#cbd5e1; --accent:#38bdf8; --border:#334155; } }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center; transition:background-color .3s,color .3s; }
a { color:var(--accent); text-decoration:none; }
.num { font-size:clamp(80px,20vw,140px); font-weight:900; color:var(--accent); line-height:1; }
h1 { font-size:1.6rem; margin:16px 0 10px; }
p { color:var(--muted); max-width:400px; margin:0 auto 32px; }
.btn { display:inline-block; padding:14px 30px; background:var(--accent); color:#fff; border-radius:14px; font-weight:800; transition:transform .2s,box-shadow .2s; }
.btn:hover { transform:translateY(-2px); box-shadow:0 10px 26px rgba(56,189,248,.35); }
img { max-width:80px; margin-bottom:24px; border-radius:10px; }
</style>
</head>
<body>
<script>const t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);</script>
<img src="/img/logo.png" alt="Checo Media Blue logo">
<div class="num">404</div>
<h1>Page not found</h1>
<p>This page doesn't exist or may have moved. Head back home and we'll get you sorted.</p>
<a class="btn" href="/">Back to home</a>
</body>
</html>
